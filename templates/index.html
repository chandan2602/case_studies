<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RSB Case Study Generator</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <div class="wrapper">
    <div class="card">

      <div class="brand">
        <div class="brand-icon">&#9788;</div>
        <div>
          <h1>RSB Case Study Generator</h1>
          <p class="subtitle">Rashtriya Sewa Bharti — ML-Enhanced Report</p>
        </div>
      </div>

      <div class="divider"></div>

      <p class="hint">Select State to generate a state-level report, or narrow down to District / Village.</p>

      <form id="reportForm">

        <div class="form-group">
          <label for="state">State <span class="required">*</span></label>
          <div class="select-wrap">
            <select id="state" name="state" required>
              <option value="">— Select State —</option>
              {% for s in states %}
              <option value="{{ s }}">{{ s }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="district">District <span class="optional">(optional)</span></label>
          <div class="select-wrap">
            <select id="district" name="district" disabled>
              <option value="">— All Districts —</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="village">Village / Area <span class="optional">(optional)</span></label>
          <div class="select-wrap">
            <select id="village" name="village" disabled>
              <option value="">— All Villages —</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="format">Download Format</label>
          <div class="select-wrap">
            <select id="format" name="format">
              <option value="docx">Word Document (.docx)</option>
              <option value="pdf">PDF (.pdf)</option>
            </select>
          </div>
        </div>

        <div id="scopeBadge" class="scope-badge hidden">
          Report scope: <strong id="scopeText">—</strong>
        </div>

        <button type="submit" id="submitBtn" disabled>
          <span id="btnText">&#8681; Generate &amp; Download Report</span>
          <span id="btnLoader" class="hidden">&#9696; Generating report...</span>
        </button>

      </form>

      <div id="errorMsg" class="error hidden"></div>

      <div class="info-strip">
        <span>&#128202; 1.6L+ Records</span>
        <span>&#128205; 34 States &bull; 647 Districts</span>
        <span>&#129302; ML-Powered</span>
      </div>

    </div>
  </div>

  <script>
    const stateEl    = document.getElementById("state");
    const districtEl = document.getElementById("district");
    const villageEl  = document.getElementById("village");
    const submitBtn  = document.getElementById("submitBtn");
    const errorMsg   = document.getElementById("errorMsg");
    const scopeBadge = document.getElementById("scopeBadge");
    const scopeText  = document.getElementById("scopeText");

    function resetSelect(el, placeholder) {
      el.innerHTML = `<option value="">${placeholder}</option>`;
      el.disabled = true;
    }

    function updateScope() {
      const s = stateEl.value, d = districtEl.value, v = villageEl.value;
      if (!s) { scopeBadge.classList.add("hidden"); return; }
      scopeBadge.classList.remove("hidden");
      if (v)      scopeText.textContent = `Village — ${v}`;
      else if (d) scopeText.textContent = `District — ${d}, ${s}`;
      else        scopeText.textContent = `State — ${s}`;
      submitBtn.disabled = false;
    }

    stateEl.addEventListener("change", async () => {
      resetSelect(districtEl, "— All Districts —");
      resetSelect(villageEl, "— All Villages —");
      updateScope();
      if (!stateEl.value) { submitBtn.disabled = true; return; }
      const res = await fetch(`/get_districts?state=${encodeURIComponent(stateEl.value)}`);
      const { districts } = await res.json();
      districts.forEach(d => districtEl.innerHTML += `<option value="${d}">${d}</option>`);
      districtEl.disabled = false;
    });

    districtEl.addEventListener("change", async () => {
      resetSelect(villageEl, "— All Villages —");
      updateScope();
      if (!districtEl.value) return;
      const res = await fetch(
        `/get_villages?state=${encodeURIComponent(stateEl.value)}&district=${encodeURIComponent(districtEl.value)}`
      );
      const { villages } = await res.json();
      villages.forEach(v => villageEl.innerHTML += `<option value="${v}">${v}</option>`);
      villageEl.disabled = false;
    });

    villageEl.addEventListener("change", updateScope);

    document.getElementById("reportForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.classList.add("hidden");
      document.getElementById("btnText").classList.add("hidden");
      document.getElementById("btnLoader").classList.remove("hidden");
      submitBtn.disabled = true;

      const body = new FormData();
      body.append("state",    stateEl.value);
      body.append("district", districtEl.value);
      body.append("village",  villageEl.value);
      body.append("format",   document.getElementById("format").value);

      try {
        const res = await fetch("/generate_case_study", { method: "POST", body });
        if (!res.ok) {
          const err = await res.json();
          errorMsg.textContent = err.error || "Something went wrong.";
          errorMsg.classList.remove("hidden");
        } else {
          const blob = await res.blob();
          const url  = URL.createObjectURL(blob);
          const a    = document.createElement("a");
          a.href     = url;
          const label = villageEl.value || districtEl.value || stateEl.value;
          const fmt   = document.getElementById("format").value;
          a.download = `case_study_${label.replace(/[^\w]/g, "_")}.${fmt}`;
          a.click();
          URL.revokeObjectURL(url);
        }
      } catch {
        errorMsg.textContent = "Network error. Please try again.";
        errorMsg.classList.remove("hidden");
      } finally {
        document.getElementById("btnText").classList.remove("hidden");
        document.getElementById("btnLoader").classList.add("hidden");
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
